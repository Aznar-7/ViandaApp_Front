<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 250" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de Orden 66 Viandas</title>
  <desc id="desc">Elegir menú, crear pedido, seguir estado y retirar vianda.</desc>
  <rect width="1100" height="250" rx="24" fill="#fffdf8"/>
  <path d="M185 125H915" stroke="#ded8cc" stroke-width="2" stroke-dasharray="5 8"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(140 125)">
      <circle r="52" fill="#f4f1e9" stroke="#ded8cc" stroke-width="2"/>
      <circle r="24" fill="#e11d48" fill-opacity=".1"/>
      <path d="M-13-4h26M-10 3h20M-7 10H7" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>
      <text y="80" fill="#211f1a" font-size="15" font-weight="700">Elegí tu menú</text>
      <text y="100" fill="#746d61" font-size="11">fecha, tipo y cupo real</text>
    </g>
    <g transform="translate(410 125)">
      <circle r="52" fill="#f4f1e9" stroke="#ded8cc" stroke-width="2"/>
      <circle r="24" fill="#e11d48" fill-opacity=".1"/>
      <path d="M-12-10h24v20h-24zM-7-15v10M7-15v10" fill="none" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>
      <text y="80" fill="#211f1a" font-size="15" font-weight="700">Creá el pedido</text>
      <text y="100" fill="#746d61" font-size="11">cantidad, turno y retiro</text>
    </g>
    <g transform="translate(690 125)">
      <circle r="52" fill="#f4f1e9" stroke="#ded8cc" stroke-width="2"/>
      <circle r="24" fill="#e11d48" fill-opacity=".1"/>
      <path d="M-14 0h28M-8-7l-7 7 7 7M8-7l7 7-7 7" fill="none" stroke="#e11d48" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="80" fill="#211f1a" font-size="15" font-weight="700">Seguí el estado</text>
      <text y="100" fill="#746d61" font-size="11">pendiente a entregado</text>
    </g>
    <g transform="translate(960 125)">
      <circle r="52" fill="#f4f1e9" stroke="#ded8cc" stroke-width="2"/>
      <circle r="24" fill="#e11d48" fill-opacity=".1"/>
      <path d="M-13 2l8 8 18-20" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="80" fill="#211f1a" font-size="15" font-weight="700">Retirá tu vianda</text>
      <text y="100" fill="#746d61" font-size="11">operación completada</text>
    </g>
  </g>
</svg>
