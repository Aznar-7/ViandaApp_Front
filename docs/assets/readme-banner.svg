    <text x="30" y="18" fill="#fda4af" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">SISTEMA ACTIVO</text>
    <text x="0" y="105" fill="#fffdf8" font-family="Arial, sans-serif" font-size="60" font-weight="800" letter-spacing="1">ORDEN 66</text>
    <text x="0" y="162" fill="#e11d48" font-family="Arial, sans-serif" font-size="60" font-weight="800" letter-spacing="1">VIANDAS</text>
    <text x="2" y="210" fill="#b7b0a4" font-family="Arial, sans-serif" font-size="18">Pedidos diarios, cupos y operaciones bajo control.</text>
    <g transform="translate(0 252)">
      <rect width="138" height="38" rx="10" fill="#e11d48"/>
      <text x="23" y="24" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1">CREAR PEDIDO</text>
      <rect x="150" width="138" height="38" rx="10" fill="none" stroke="#fff" stroke-opacity=".18"/>
      <text x="177" y="24" fill="#d8d3ca" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1">VER MENÚS</text>
    </g>
