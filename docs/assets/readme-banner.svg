<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Orden 66 Viandas</title>
  <desc id="desc">Sistema profesional de pedidos de viandas con identidad de centro de comando.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0e"/>
      <stop offset="0.58" stop-color="#11151d"/>
      <stop offset="1" stop-color="#1a1015"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#e11d48" stop-opacity=".22"/>
      <stop offset="1" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#fff" stroke-opacity=".035"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="30" fill="url(#grid)"/>
  <circle cx="1015" cy="235" r="300" fill="url(#glow)"/>
  <path d="M0 430H1280" stroke="#e11d48" stroke-opacity=".4"/>
  <path d="M0 438H1280" stroke="#fff" stroke-opacity=".06"/>

  <g transform="translate(95 83)">
